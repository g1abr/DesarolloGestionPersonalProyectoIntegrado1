<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Agregar / Editar Empleado</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url("/img/rh.jpg");
        background-size: cover;
      }

      .card {
        width: 100%;
        max-width: 500px;
        border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .card-header {
        text-align: center;
        padding: 1rem;
        font-size: 1.25rem;
        font-weight: bold;
      }

      .form-floating > label {
        font-size: 0.85rem;
      }

      .form-control {
        height: 40px;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="card-header">
        <span
          th:text="${employee.id} == null ? 'Agregar empleado' : 'Editar empleado'"
        ></span>
      </div>
      <div class="card-body p-4">
        <form th:action="@{/save}" th:object="${employee}" method="post">
          <input type="hidden" th:field="*{id}" />

          <div class="row g-2">
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input
                  type="text"
                  th:field="*{firstName}"
                  class="form-control"
                  id="firstName"
                  placeholder="Nombre"
                  required
                />

                <div
                  class="text-danger"
                  th:if="${#fields.hasErrors('firstName')}"
                  th:errors="*{firstName}"
                ></div>
                <label for="firstName">Nombre</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input
                  type="text"
                  th:field="*{lastName}"
                  class="form-control"
                  id="lastName"
                  placeholder="Apellido"
                  required
                />
                <div class="text-danger"
     th:if="${#fields.hasErrors('lastName')}"
     th:errors="*{lastName}">
</div>
                <label for="lastName">Apellido</label>
              </div>
            </div>
          </div>

          <div class="row g-2">
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input
                  type="email"
                  th:field="*{email}"
                  class="form-control"
                  id="email"
                  placeholder="Email"
                  required
                />
                <div class="text-danger"
     th:if="${#fields.hasErrors('email')}"
     th:errors="*{email}">
</div>
                <label for="email">Email</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input
                  type="text"
                  th:field="*{position}"
                  class="form-control"
                  id="position"
                  placeholder="Puesto"
                  required
                />
                <div class="text-danger"
     th:if="${#fields.hasErrors('position')}"
     th:errors="*{position}">
</div><div class="text-danger"
     th:if="${#fields.hasErrors('position')}"
     th:errors="*{position}">
</div>
                <label for="position">Puesto</label>
              </div>
            </div>
          </div>

          <div class="form-floating mb-3">
            <input
              type="number"
              th:field="*{salary}"
              class="form-control"
              id="salary"
              placeholder="Salario"
              step="0.01"
              min="0"
              required
            /> <div class="text-danger"
     th:if="${#fields.hasErrors('salary')}"
     th:errors="*{salary}">
</div>
            <label for="salary">Salario</label>
          </div>

          <div class="d-grid gap-2 d-md-flex justify-content-md-center">
            <button type="submit" class="btn btn-outline-primary px-4">
              Guardar
            </button>
            <a class="btn btn-outline-danger px-4" th:href="@{/}">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
